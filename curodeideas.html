<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subcontenidos PRO</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #fff;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 30px;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

.subtitle{
  text-align:center;
  opacity:0.7;
  margin-bottom:30px;
}

.video-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  position: relative;
}

.video-card:hover {
  transform: translateY(-8px) scale(1.01);
  box-shadow: 0 0 20px rgba(0,255,200,0.5);
}

.badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #22d3ee;
  color: black;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: bold;
}

video {
  width: 100%;
  border-radius: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #4ade80, #22d3ee);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.85;
  transform: scale(1.02);
}

button.done {
  background: #4ade80;
}

.progress-box {
  margin-top: 30px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  text-align: center;
}

.completed {
  border: 2px solid #4ade80;
  box-shadow: 0 0 25px #4ade80;
}

.bar {
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 15px;
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4ade80, #22d3ee);
  transition: 0.4s;
}

</style>
</head>

<body>

<div class="container">
  <h1>🚀 Subcontenidos del Curso</h1>
  <p class="subtitle">Completa los videos para desbloquear tu progreso</p>

  <div class="video-card">
    <div class="badge">Video 1</div>
    <video id="v1" controls>
      <source src="video1.mp4" type="video/mp4">
    </video>
    <button id="b0" onclick="mark(0)">Completar</button>
  </div>

  <div class="video-card">
    <div class="badge">Video 2</div>
    <video id="v2" controls>
      <source src="video2.mp4" type="video/mp4">
    </video>
    <button id="b1" onclick="mark(1)">Completar</button>
  </div>

  <div class="video-card">
    <div class="badge">Video 3</div>
    <video id="v3" controls>
      <source src="video3.mp4" type="video/mp4">
    </video>
    <button id="b2" onclick="mark(2)">Completar</button>
  </div>

  <div id="box" class="progress-box">
    <h2>Progreso</h2>
    <p id="txt">0 / 3 completados</p>
    <div class="bar"><div id="fill" class="fill"></div></div>
  </div>

</div>

<script>
let done = [false,false,false];

function mark(i){
  done[i] = true;
  document.getElementById('b'+i).classList.add('done');
  document.getElementById('b'+i).innerText = '✔ Completado';
  update();
}

function update(){
  let c = done.filter(x=>x).length;
  document.getElementById('txt').innerText = c + ' / 3 completados';

  let percent = (c/3)*100;
  document.getElementById('fill').style.width = percent + '%';

  if(c===3){
    document.getElementById('box').classList.add('completed');
    document.getElementById('txt').innerText = '🎉 CURSO COMPLETADO';

    const btn = document.createElement('button');
    btn.innerText = '📄 Descargar Diploma';
    btn.onclick = descargarDiploma;
    btn.style.marginTop = '15px';

    document.getElementById('box').appendChild(btn);
  }
}

function descargarDiploma(){
  const contenido = `DIPLOMA DE FINALIZACIÓN

Este documento certifica que has completado el curso exitosamente.

Felicidades 🎉`;

  const blob = new Blob([contenido], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'diploma.pdf';
  a.click();

  URL.revokeObjectURL(url);
}

</script>

</body>
</html>
