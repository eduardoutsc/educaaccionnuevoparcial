<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios Registrados</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

.container {
    margin-top: 60px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.list-group-item {
    background: rgba(255,255,255,0.05) !important;
    border-radius: 15px !important;
    color: white !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>

<script type="module">
// 🔥 IMPORTS CORRECTOS
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 CONFIG (YA ES TUYA)
const firebaseConfig = {
  apiKey: "AIzaSyAG8y2Zo8z1Gd5S0SRujr2jyQDYZF2RCj8",
  authDomain: "educaaccionedu.firebaseapp.com",
  projectId: "educaaccionedu",
  storageBucket: "educaaccionedu.firebasestorage.app",
  messagingSenderId: "660080325935",
  appId: "1:660080325935:web:1487f838c86a2ac4835dda"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 OBTENER USUARIOS
async function getUsers() {
    const userList = document.getElementById("userList");
    userList.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "users"));

    querySnapshot.forEach((docSnap) => {
        const user = docSnap.data();
        const id = docSnap.id;

        const li = document.createElement("li");
        li.className = "list-group-item";

        li.innerHTML = `
            <span>
                📧 ${user.email}<br>
                🕒 ${user.createdAt?.toDate().toLocaleString()}
            </span>
        `;

        const btn = document.createElement("button");
        btn.className = "btn btn-danger btn-sm";
        btn.textContent = "Eliminar";

        // 🔥 BORRAR REAL
        btn.onclick = async () => {
            await deleteDoc(doc(db, "users", id));
            li.remove();
        };

        li.appendChild(btn);
        userList.appendChild(li);
    });
}

// CARGAR AL INICIO
window.onload = getUsers;

</script>

</head>

<body>

<div class="container">
    <h1>👥 Usuarios Registrados</h1>

    <ul id="userList" class="list-group"></ul>
</div>

</body>
</html>
