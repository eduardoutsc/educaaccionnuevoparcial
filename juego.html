<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mecanografia  🚀</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:white;
}

/* LAYOUT */
.app{display:flex;height:100vh;}

.sidebar{
    width:260px;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(12px);
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.title{
    font-size:22px;
    color:#22c55e;
    text-shadow:0 0 10px #22c55e;
}

/* STATS */
.statCard{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    padding:12px;
    margin:10px 0;
    display:flex;
    justify-content:space-between;
    transition:0.2s;
}
.statCard:hover{transform:scale(1.05);}

.value{font-weight:bold;}
.green{color:#22c55e;}
.blue{color:#38bdf8;}
.orange{color:#f97316;}
.gold{color:#facc15;}
.purple{color:#a855f7;}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:720px;
    padding:30px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

/* TEXTO */
#texto{
    font-size:26px;
    text-align:center;
}
.correct{color:#22c55e;}
.error{color:#ef4444;}
.active{background:#334155;}

/* INPUT */
input{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#020617;
    color:white;
}

/* PROGRESS */
.progress{height:8px;background:#1e293b;margin-top:10px;border-radius:10px;}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#38bdf8);}

/* TECLADO */
#keyboard{
    margin-top:20px;
    text-align:center;
}
.key{
    display:inline-block;
    padding:10px;
    margin:3px;
    background:#1e293b;
    border-radius:5px;
    transition:0.1s;
}
.activeKey{
    background:#22c55e;
    color:black;
    transform:scale(1.2);
}

/* BOTONES */
button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#22c55e,#38bdf8);
    cursor:pointer;
}

/* FINAL */
.result{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
    flex-direction:column;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div>
<div class="title">⚡ Mecanografia</div>

<div class="statCard">⏱ Tiempo <span id="time" class="value">30</span></div>
<div class="statCard">⚡ WPM <span id="wpm" class="value blue">0</span></div>
<div class="statCard">🎯 Precisión <span id="precision" class="value green">100%</span></div>
<div class="statCard">🔥 Combo <span id="combo" class="value orange">0</span></div>
<div class="statCard">🏆 Puntos <span id="score" class="value gold">0</span></div>
<div class="statCard">🎮 Nivel <span id="level" class="value purple">1</span></div>

</div>

<button onclick="togglePause()">⏸ Pausa</button>
<button onclick="reiniciar()">🔄 Reiniciar</button>

</div>

<div class="main">
<div class="card">

<div id="texto"></div>
<input id="input">
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="keyboard"></div>

</div>
</div>

</div>

<div class="result" id="result">
<h1>🏆 RESULTADOS</h1>
<p id="finalStats"></p>
<button onclick="reiniciar()">Jugar otra vez</button>
</div>

<script>
// AUDIO
const keySound=new Audio("typing.mp3");
const winSound=new Audio("win.mp3");
const loseSound=new Audio("lose.mp3");

// PALABRAS
const palabras=["casa","gato","perro","sol","codigo","rapido","algoritmo","estructura","javascript","practica"];

// VARIABLES
let texto="",nivel=1,tiempo=30,errores=0,combo=0,score=0,start;
let pausa=false;

// ELEMENTOS
const textoDiv=document.getElementById("texto");
const input=document.getElementById("input");
const timeSpan=document.getElementById("time");
const wpmSpan=document.getElementById("wpm");
const precisionSpan=document.getElementById("precision");
const comboSpan=document.getElementById("combo");
const scoreSpan=document.getElementById("score");
const levelSpan=document.getElementById("level");
const bar=document.getElementById("bar");
const keyboard=document.getElementById("keyboard");
const result=document.getElementById("result");
const finalStats=document.getElementById("finalStats");

// TECLADO
const letras="abcdefghijklmnopqrstuvwxyz ";
letras.split("").forEach(l=>{
    let k=document.createElement("div");
    k.className="key";
    k.textContent=l===" "?"␣":l;
    k.id="k_"+(l===" "?"space":l);
    keyboard.appendChild(k);
});

// TEXTO DINÁMICO
function generarTexto(){
    let frase=[];
    for(let i=0;i<5+nivel;i++){
        frase.push(palabras[Math.floor(Math.random()*palabras.length)]);
    }
    return frase.join(" ");
}

// INICIAR
function iniciar(){
    texto=generarTexto();
    textoDiv.innerHTML="";
    texto.split("").forEach(l=>{
        let span=document.createElement("span");
        span.textContent=l;
        textoDiv.appendChild(span);
    });

    input.value="";
    errores=0;
    combo=0;
    tiempo=30;
    start=Date.now();
    pausa=false;
}

// TIMER
setInterval(()=>{
    if(pausa) return;

    tiempo--;
    timeSpan.textContent=tiempo;

    if(tiempo<=0){
        mostrarResultado();
    }
},1000);

// INPUT
input.addEventListener("input",()=>{
    if(pausa) return;

    keySound.currentTime=0;
    keySound.play();

    let valor=input.value;
    let spans=textoDiv.children;

    let erroresLocales=0;

    for(let i=0;i<spans.length;i++){
        let span=spans[i];
        let letra=valor[i];

        if(letra==null) span.className="";
        else if(letra===span.textContent) span.className="correct";
        else{span.className="error";erroresLocales++;}

        if(i===valor.length) span.classList.add("active");
    }

    // TECLADO VISUAL CORRECTO
    document.querySelectorAll(".key").forEach(k=>k.classList.remove("activeKey"));
    let last=valor.slice(-1) || " ";
    let keyId = last===" " ? "k_space" : "k_"+last;
    let key=document.getElementById(keyId);
    if(key) key.classList.add("activeKey");

    errores=erroresLocales;

    let precision=valor.length?((valor.length-errores)/valor.length)*100:100;
    precisionSpan.textContent=precision.toFixed(0)+"%";

    let tiempoReal=(Date.now()-start)/60000;
    let wpm=(valor.length/5)/tiempoReal;
    wpmSpan.textContent=Math.round(wpm);

    combo=erroresLocales===0?combo+1:0;
    comboSpan.textContent=combo;

    score+=combo;
    scoreSpan.textContent=score;

    bar.style.width=(valor.length/texto.length)*100+"%";

    if(valor===texto){
        winSound.play();
        nivel++;
        levelSpan.textContent=nivel;
        iniciar();
    }
});

// PAUSA
function togglePause(){
    pausa=!pausa;
}

// RESULTADO FINAL
function mostrarResultado(){
    loseSound.play();

    finalStats.innerHTML=`
⏱ Tiempo: ${tiempo}<br>
⚡ WPM: ${wpmSpan.textContent}<br>
🎯 Precisión: ${precisionSpan.textContent}<br>
🔥 Combo: ${combo}<br>
🏆 Puntos: ${score}<br>
🎮 Nivel: ${nivel}
`;

    result.style.display="flex";
}

// REINICIAR
function reiniciar(){
    result.style.display="none";
    score=0;
    nivel=1;
    iniciar();
}

iniciar();
</script>

</body>
</html>
