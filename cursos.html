<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EducaAcción - Cursos</title>

<style>

/* 🔥 FONDO */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    margin:0;
}

/* GRID */
.courses-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 40px;
}

/* TARJETA */
.course-card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(15px);
    transition: 0.3s;
    text-align: center;
}

.course-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.6);
}

/* IMAGEN */
.course-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

/* CONTENIDO */
.course-content {
    padding: 20px;
}

/* BOTÓN */
.btn {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    background: linear-gradient(90deg,#4ade80,#22d3ee);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #22d3ee;
}

</style>
</head>

<body>

<h1 style="text-align:center; margin-top:20px;">🚀 EducaAcción</h1>

<section class="courses-container">

<!-- CURSO 1 -->
<div class="course-card">
    <img src="español.jpeg">
    <div class="course-content">
        <h3>Español</h3>
        <p>Ortografía y redacción</p>
        <div class="btn" onclick="ir('cursoespañol.html')">Comenzar</div>
    </div>
</div>

<!-- CURSO 2 -->
<div class="course-card">
    <img src="mate.jpeg">
    <div class="course-content">
        <h3>Matemáticas</h3>
        <p>Ejercicios prácticos</p>
        <div class="btn" onclick="ir('contenidodecursomatematica.html')">Comenzar</div>
    </div>
</div>

<!-- CURSO 3 -->
<div class="course-card">
    <img src="aordeon.jpeg">
    <div class="course-content">
        <h3>Acordeón</h3>
        <p>Aprende música</p>
        <div class="btn" onclick="ir('acordeoncurso.html')">Comenzar</div>
    </div>
</div>

<!-- CURSO 4 -->
<div class="course-card">
    <img src="mecanografia.jpeg">
    <div class="course-content">
        <h3>Mecanografia </h3>
        <p>mejora tu escritura </p>
        <div class="btn" onclick="ir('juego.html')">Comenzar</div>
    </div>
</div>

</section>

<script>
function ir(pagina){
    window.location.href = pagina;
}
</script>

</body>
</html>
